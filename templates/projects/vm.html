<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --vm-primary: #00ff88;
            --vm-secondary: #00d9ff;
            --vm-accent: #ff00aa;
            --vm-bg: #0d1117;
            --vm-card: #161b22;
            --vm-border: #30363d;
            --vm-text: #e6edf3;
            --vm-text-muted: #8b949e;
        }

        body {
            background: var(--vm-bg);
            color: var(--vm-text);
            font-family: 'IBM Plex Mono', monospace;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 100vh;
            width: 100%;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        .vm-header {
            text-align: center;
            border-bottom: 2px solid var(--vm-border);
            padding-bottom: 8px;
            width: 100%;
        }

        .vm-header h2 {
            margin: 0;
            color: var(--vm-primary);
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .vm-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto auto auto;
            gap: 10px;
            width: 100%;
            box-sizing: border-box;
            flex: 1;
        }

        .panel {
            background: var(--vm-card);
            border: 1px solid var(--vm-border);
            border-radius: 6px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        @media (max-width: 800px) {
            .vm-layout {
                grid-template-columns: 1fr !important;
                grid-template-rows: auto !important;
            }

            .panel.full-width-mobile {
                grid-column: span 1;
            }
        }

        .panel-title {
            font-size: 0.7rem;
            color: var(--vm-text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
        }

        /* Program / Code View */
        .code-view {
            font-size: 0.8rem;
            line-height: 1.4;
            max-height: 250px;
            overflow-y: auto;
        }

        .instruction-line {
            display: flex;
            gap: 10px;
            padding: 4px 5px;
            border-radius: 3px;
        }

        .instruction-line.active {
            background: rgba(0, 255, 136, 0.1);
            border-left: 3px solid var(--vm-primary);
        }

        .addr {
            color: var(--vm-text-muted);
            width: 25px;
            flex-shrink: 0;
        }

        .op {
            color: var(--vm-accent);
            font-weight: bold;
        }

        .arg {
            color: var(--vm-secondary);
        }

        /* Registers */
        .registers {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
            gap: 8px;
        }

        .reg-box {
            background: var(--vm-bg);
            border: 1px solid var(--vm-border);
            padding: 6px;
            border-radius: 4px;
            text-align: center;
        }

        .reg-label {
            font-size: 0.65rem;
            color: var(--vm-text-muted);
        }

        .reg-val {
            font-size: 1rem;
            color: var(--vm-primary);
            font-weight: bold;
        }

        /* Stack */
        .stack-view {
            min-height: 120px;
            flex: 1;
            display: flex;
            flex-direction: column-reverse;
            gap: 4px;
            overflow-y: auto;
            padding: 5px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
        }

        .stack-item {
            background: var(--vm-bg);
            border: 1px solid var(--vm-border);
            padding: 6px;
            text-align: center;
            border-radius: 4px;
            position: relative;
            font-size: 0.8rem;
            animation: slideIn 0.2s ease;
        }

        .stack-item.sp {
            border-color: var(--vm-secondary);
            background: rgba(0, 217, 255, 0.1);
            color: var(--vm-secondary);
            font-weight: bold;
        }

        .stack-item.sp::after {
            content: '◄ SP';
            position: absolute;
            right: 8px;
            font-size: 0.6rem;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-5px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Controls */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 10px;
        }

        .btn {
            background: transparent;
            border: 1px solid var(--vm-primary);
            color: var(--vm-primary);
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
            transition: all 0.2s;
            flex: 1;
            min-width: 80px;
            max-width: 120px;
        }

        .btn:hover:not(:disabled) {
            background: var(--vm-primary);
            color: var(--vm-bg);
        }

        .btn:disabled {
            border-color: var(--vm-border);
            color: var(--vm-text-muted);
            cursor: not-allowed;
        }

        /* Console */
        .console {
            background: #000;
            color: #00ff00;
            padding: 10px;
            font-size: 0.75rem;
            border-radius: 4px;
            height: 80px;
            overflow-y: auto;
            border: 1px solid var(--vm-border);
        }
    </style>
</head>

<body>
    <div class="vm-header">
        <h2>Virtual Machine Core 0</h2>
    </div>

    <div class="vm-layout">
        <div class="panel">
            <div class="panel-title">Program ROM</div>
            <div class="code-view" id="programView">
                <!-- Program will be loaded here -->
            </div>
        </div>

        <div class="panel">
            <div class="panel-title">Register File</div>
            <div class="registers">
                <div class="reg-box">
                    <div class="reg-label">A</div>
                    <div class="reg-val" id="reg-A">00</div>
                </div>
                <div class="reg-box">
                    <div class="reg-label">B</div>
                    <div class="reg-val" id="reg-B">00</div>
                </div>
                <div class="reg-box">
                    <div class="reg-label">C</div>
                    <div class="reg-val" id="reg-C">00</div>
                </div>
                <div class="reg-box">
                    <div class="reg-label">IP</div>
                    <div class="reg-val" id="reg-IP">00</div>
                </div>
            </div>

            <div class="panel-title" style="margin-top:20px">Memory Stack</div>
            <div class="stack-view" id="stackView">
                <!-- Stack items will appear here -->
            </div>
        </div>

        <div class="panel" style="grid-column: span 2">
            <div class="panel-title">System Console</div>
            <div class="console" id="console">Initializing system... [OK]</div>
            <div class="controls" style="margin-top:15px">
                <button class="btn" id="stepBtn" onclick="vm.step()">STEP</button>
                <button class="btn" id="runBtn" onclick="vm.run()">RUN</button>
                <button class="btn" id="resetBtn" onclick="vm.reset()">RESET</button>
            </div>
        </div>
    </div>

    <script>
        const Opcodes = {
            PSH: 'PSH',
            ADD: 'ADD',
            POP: 'POP',
            SET: 'SET',
            HLT: 'HLT'
        };

        const program = [
            { op: Opcodes.PSH, arg: 5 },
            { op: Opcodes.PSH, arg: 12 },
            { op: Opcodes.ADD },
            { op: Opcodes.PSH, arg: 3 },
            { op: Opcodes.ADD },
            { op: Opcodes.POP },
            { op: Opcodes.HLT }
        ];

        class VirtualMachine {
            constructor() {
                this.reset();
                this.renderProgram();
            }

            reset() {
                this.registers = { A: 0, B: 0, C: 0, IP: 0 };
                this.stack = [];
                this.running = false;
                this.halted = false;
                this.updateUI();
                this.log("System reset.");
                document.getElementById('stepBtn').disabled = false;
                document.getElementById('runBtn').disabled = false;
            }

            log(msg) {
                const con = document.getElementById('console');
                con.innerHTML += `<div>> ${msg}</div>`;
                con.scrollTop = con.scrollHeight;
            }

            renderProgram() {
                const view = document.getElementById('programView');
                view.innerHTML = program.map((inst, i) => `
                    <div class="instruction-line" id="line-${i}">
                        <span class="addr">${i.toString(16).padStart(2, '0')}</span>
                        <span class="op">${inst.op}</span>
                        <span class="arg">${inst.arg !== undefined ? inst.arg : ''}</span>
                    </div>
                `).join('');
            }

            updateUI() {
                // Update registers
                for (let reg in this.registers) {
                    document.getElementById(`reg-${reg}`).innerText = this.registers[reg].toString().padStart(2, '0');
                }

                // Update instruction highlight
                document.querySelectorAll('.instruction-line').forEach(el => el.classList.remove('active'));
                const currentLine = document.getElementById(`line-${this.registers.IP}`);
                if (currentLine) currentLine.classList.add('active');

                // Update stack
                const sView = document.getElementById('stackView');
                sView.innerHTML = this.stack.map((val, i) => `
                    <div class="stack-item ${i === this.stack.length - 1 ? 'sp' : ''}">
                        ${val}
                    </div>
                `).join('');
            }

            step() {
                if (this.halted) return;

                const instr = program[this.registers.IP];
                if (!instr) return;

                switch (instr.op) {
                    case Opcodes.PSH:
                        this.stack.push(instr.arg);
                        this.log(`PUSHED ${instr.arg}`);
                        break;
                    case Opcodes.ADD:
                        const v1 = this.stack.pop();
                        const v2 = this.stack.pop();
                        const res = v1 + v2;
                        this.stack.push(res);
                        this.log(`ADD: ${v1} + ${v2} = ${res}`);
                        break;
                    case Opcodes.POP:
                        const popped = this.stack.pop();
                        this.log(`POPPED: ${popped}`);
                        break;
                    case Opcodes.HLT:
                        this.log("HALT instruction encountered.");
                        this.halted = true;
                        document.getElementById('stepBtn').disabled = true;
                        document.getElementById('runBtn').disabled = true;
                        break;
                }

                if (!this.halted) {
                    this.registers.IP++;
                }
                this.updateUI();
            }

            run() {
                if (this.running) return;
                this.running = true;
                const executeNext = () => {
                    if (this.halted || !this.running) {
                        this.running = false;
                        return;
                    }
                    this.step();
                    setTimeout(executeNext, 500);
                };
                executeNext();
            }
        }

        const vm = new VirtualMachine();
    </script>
</body>

</html>
